name: Sync match results

on:
  schedule:
    - cron: "0 * * * *" # cada hora
  workflow_dispatch: # permite correrlo manualmente desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          curl -s -f \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            ${{ secrets.APP_URL }}/api/cron/sync-results
